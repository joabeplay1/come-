<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Domino Play Premium</title>
    <link rel="stylesheet" href="../src/css/theme.css">
    <style>
        #app-container { width: 100vw; height: 100vh; position: relative; }
        .screen { display: none; position: absolute; width: 100%; height: 100%; top: 0; left: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .screen.active { display: flex; }
        
        /* Tabuleiro Realista */
        #game-board {
            width: 85%; height: 60%;
            background: var(--table-gradient);
            border: 12px solid #1a110b; /* Moldura de madeira escura */
            border-radius: 24px;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.9), 0 20px 40px rgba(0,0,0,0.6);
        }
        
        /* Mão do Jogador */
        #player-hand {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 12px; padding: 10px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px; border: 1px solid var(--glass-border);
        }

        /* Pedrinhas de Dominó Estilizadas */
        .domino-piece {
            width: 45px; height: 90px;
            background: #fcfcfc; color: #111;
            border-radius: 6px; display: flex; flex-direction: column;
            justify-content: space-around; align-items: center;
            font-weight: bold; font-size: 20px; cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            transition: transform 0.15s ease;
        }
        .domino-piece:hover { transform: translateY(-10px); box-shadow: 0 0 15px var(--neon-blue); }
        
        /* Destaque do Turno Ativo */
        .turn-indicator {
            position: absolute; top: 15px; right: 15px;
            padding: 8px 16px; border-radius: 20px;
            font-weight: bold; text-transform: uppercase;
        }
        .my-turn { background: rgba(57, 255, 20, 0.2); border: 1px solid var(--neon-green); color: var(--neon-green); }
        .other-turn { background: rgba(255, 0, 0, 0.2); border: 1px solid #ff0055; color: #ff0055; }
    </style>
</head>
<body>

    <div id="app-container">
        <!-- CANVAS PARA EFEITO DE PARTÍCULAS NO FUNDO -->
        <canvas id="bg-particles" style="position:absolute; top:0; left:0; pointer-events:none; z-index:1;"></canvas>

        <!-- TELA DE LOGIN -->
        <div id="screen-login" class="screen active" style="z-index: 2;">
            <div class="glass-panel" style="padding: 40px; text-align: center;">
                <h1 style="color: var(--neon-blue); text-shadow: 0 0 10px rgba(0,240,255,0.5);">DOMINÓ PLAY</h1>
                <p style="color: var(--text-secondary);">A experiência Premium do Dominó Brasileiro</p>
                <input type="text" id="username" placeholder="Digite seu Nome" style="padding: 12px; margin: 20px 0; width: 80%; border-radius: 6px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.5); color: #fff; text-align:center;">
                <br>
                <button id="btn-login" class="btn-premium">Entrar no Lobby</button>
            </div>
        </div>

        <!-- TELA DE LOBBY / ESCOLHA DE SALA -->
        <div id="screen-lobby" class="screen" style="z-index: 2;">
            <div class="glass-panel" style="padding: 40px; width: 320px; display:flex; flex-direction:column; gap:20px;">
                <h2 style="text-align: center; margin:0;">Salas Online</h2>
                <button id="btn-create-room" class="btn-premium green">Criar Sala Privada</button>
                <div style="border-top: 1px solid var(--glass-border); my: 10px;"></div>
                <input type="text" id="room-code-input" placeholder="CÓDIGO DA SALA" style="padding: 12px; border-radius: 6px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.3); color: #fff; text-align: center; font-weight: bold;">
                <button id="btn-join-room" class="btn-premium">Entrar com Código</button>
            </div>
        </div>

        <!-- TELA DO JOGO (TABULEIRO) -->
        <div id="screen-game" class="screen" style="z-index: 2;">
            <div id="turn-badge" class="turn-indicator other-turn">Aguardando...</div>
            
            <!-- Mesa de Jogo -->
            <div id="game-board">
                <!-- As pedras jogadas serão injetadas dinamicamente aqui -->
            </div>

            <!-- Mão do Jogador Humano -->
            <div id="player-hand"></div>
        </div>
    </div>

    <!-- SCRIPT DE EXECUÇÃO DO FRONTEND -->
    <script type="module">
        import { auth, signInAnonymously } from "../src/js/config/firebase.js";
        import { RoomManager } from "../src/js/network/room.js";
        import { DominoVoice } from "../src/js/core/voice.js";
        import { DominoEngine } from "../src/js/core/engine.js";

        let localPlayer = { id: null, name: "" };
        let currentRoomCode = null;

        // Efeito Visual de Partículas de Fundo (Estilo Cassino Futurista)
        const canvas = document.getElementById('bg-particles');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = Array.from({length: 40}, () => ({
            x: Math.random() * canvas.width, y: Math.random() * canvas.height,
            r: Math.random() * 2 + 1, d: Math.random() * 0.5 + 0.2
        }));
        function drawParticles() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "rgba(0, 240, 255, 0.15)";
            ctx.beginPath();
            particles.forEach(p => {
                ctx.moveTo(p.x, p.y); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2, true);
                p.y -= p.d; if(p.y < 0) p.y = canvas.height;
            });
            ctx.fill(); requestAnimationFrame(drawParticles);
        }
        drawParticles();

        // Gerenciamento de Telas
        function changeScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // Fluxo de Ações: Autenticação Anônima do Firebase
        document.getElementById('btn-login').addEventListener('click', async () => {
            const nameInput = document.getElementById('username').value.trim();
            if(!nameInput) return alert("Por favor, digite seu nome de jogador.");
            
            localPlayer.name = nameInput;
            const cred = await signInAnonymously(auth);
            localPlayer.id = cred.user.uid;

            changeScreen('screen-lobby');
        });

        // Criar Sala
        document.getElementById('btn-create-room').addEventListener('click', async () => {
            currentRoomCode = await RoomManager.createRoom(localPlayer.id, localPlayer.name);
            alert(`Sala criada! Compartilhe o código: ${currentRoomCode}`);
            startGameSession(currentRoomCode);
        });

        // Entrar em Sala Existente
        document.getElementById('btn-join-room').addEventListener('click', async () => {
            const code = document.getElementById('room-code-input').value.toUpperCase().trim();
            if(!code) return alert("Insira o código gerado pelo seu amigo.");
            
            await RoomManager.joinRoom(code, localPlayer.id, localPlayer.name);
            currentRoomCode = code;
            startGameSession(currentRoomCode);
        });

        // Sessão ativa e escuta em tempo real do Firebase
        function startGameSession(code) {
            changeScreen('screen-game');
            RoomManager.listenToRoom(code, (roomData) => {
                renderGame(roomData);
            });
        }

        // Renderizador em tempo real e chamadas de som e voz por turnos
        let lastTurn = null;
        function renderGame(room) {
            const badge = document.getElementById('turn-badge');
            
            // Sincronização estrutural de quem joga
            if (room.turn === localPlayer.id) {
                badge.textContent = "Sua Vez";
                badge.className = "turn-indicator my-turn";
            } else {
                const opponentName = Object.values(room.players).find(p => p.name !== localPlayer.name)?.name || "Oponente";
                badge.textContent = `Vez de ${opponentName}`;
                badge.className = "turn-indicator other-turn";
            }

            // Mock de carregamento inicial da mão se for o começo da partida
            const handContainer = document.getElementById('player-hand');
            handContainer.innerHTML = "";
            
            // Exemplo de renderização estática para teste de manipulação de DOM/CSS
            const mockHand = [{l:6, r:6}, {l:6, r:2}, {l:3, r:4}];
            mockHand.forEach(p => {
                const el = document.createElement('div');
                el.className = "domino-piece";
                el.innerHTML = `<div>${p.l}</div><div>${p.r}</div>`;
                el.onclick = () => {
                    if(room.turn !== localPlayer.id) return alert("Aguarde o seu turno!");
                    
                    // Executa o sistema de voz inteligente na jogada
                    DominoVoice.speak(p.l, p.r);
                };
                handContainer.appendChild(el);
            });
        }
    </script>
</body>
</html>
